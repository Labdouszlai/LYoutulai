  <body>
    <div id="app"></div>
    <script>
      // Lightweight mode feature by l'abdouszlai
      (function() {
        function renameHardwareAccelLabel() {
          var paragraphs = document.querySelectorAll('p');
          for (var i = 0; i < paragraphs.length; i++) {
            if (paragraphs[i].textContent.trim().startsWith('Disable hardware acceleration')) {
              var firstText = paragraphs[i].childNodes[0];
              if (firstText) firstText.textContent = 'Enable lightweight mode ';
            }
          }
        }
        setInterval(renameHardwareAccelLabel, 500);
      })();
    </script>
  </body>
